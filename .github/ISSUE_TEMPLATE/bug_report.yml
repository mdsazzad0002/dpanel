name: Bug report
description: Report a reproducible dPanel bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Do not include secrets, tokens, private keys, customer data, or full `.env` files.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - dpanel Laravel app
        - drust Rust API
        - dscript installer/scripts
        - docs/static site
        - permissions/filemanager
        - web stack/vhost
        - database
        - SSL
        - other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Ubuntu 24.04, PHP 8.3, nginx/apache, commit hash"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets before posting logs.
