name: Feature request
description: Suggest an improvement for dPanel
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or server operation problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the workflow or behavior you want.
    validations:
      required: true
  - type: dropdown
    id: layers
    attributes:
      label: Affected layer
      multiple: true
      options:
        - dpanel Laravel app
        - drust Rust API
        - dscript installer/scripts
        - docs/static site
        - unsure
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
