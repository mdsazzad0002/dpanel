server {
    listen 80;
    server_name {{domain}} www.{{domain}};

    root {{root}};
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php{{php_version}}-fpm.sock;
    }
}
